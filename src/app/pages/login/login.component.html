<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-container">
        <!-- Icône vectorielle pour un rendu professionnel premium -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="M9 11l2 2 4-4"/>
        </svg>
      </div>
      <h1>Portail Sécurité</h1>
      <p class="subtitle">Gestion et Pointage des Visiteurs</p>
    </div>

    <!-- Alertes d'erreurs d'authentification ou réseau -->
    <div class="alert alert-danger" *ngIf="errorMessage">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="alert-icon">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span>{{ errorMessage }}</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      
      <!-- Champ Adresse Email -->
      <div class="form-group" [class.has-error]="f['email'].touched && f['email'].invalid">
        <label for="email">Adresse Email Professionnelle</label>
        <div class="input-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            placeholder="agent.securite@entreprise.com"
            [attr.disabled]="loading ? true : null"
            autocomplete="email"
          />
        </div>
        <div class="error-feedback" *ngIf="f['email'].touched && f['email'].errors">
          <span *ngIf="f['email'].errors['required']">L'adresse email est requise.</span>
          <span *ngIf="f['email'].errors['email']">Veuillez saisir une adresse email valide.</span>
        </div>
      </div>

      <!-- Champ Mot de passe -->
      <div class="form-group" [class.has-error]="f['password'].touched && f['password'].invalid">
        <label for="password">Mot de passe</label>
        <div class="input-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="••••••••"
            [attr.disabled]="loading ? true : null"
            autocomplete="current-password"
          />
        </div>
        <div class="error-feedback" *ngIf="f['password'].touched && f['password'].errors">
          <span *ngIf="f['password'].errors['required']">Le mot de passe est requis.</span>
          <span *ngIf="f['password'].errors['minlength']">Le mot de passe doit faire au moins 6 caractères.</span>
        </div>
      </div>

      <!-- Bouton de connexion avec loader RxJS / Micro-animation -->
      <button type="submit" class="btn-login" [disabled]="loginForm.invalid || loading">
        <span *ngIf="!loading">Se connecter</span>
        <div class="spinner" *ngIf="loading"></div>
      </button>

    </form>
  </div>
</div>
